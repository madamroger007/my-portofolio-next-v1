name: CI - Next.js Build Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  test:
    name: Install & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          # HARUS sama dengan versi pembuat pnpm-lock.yaml
          version: 10.27.0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Aktifkan jika memang ada test
      # - name: Run unit tests
      #   run: pnpm test

  build:
    name: Build Next.js Application
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.27.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_URL_PRODUCTION: "https://www.adamstd.my.id"
          URL_LOCAL: "http://localhost:3000"
          URL_IMG_OPENGRAPH: "/src/img/icon/madamroger.svg"
          URL_IMG_TWITTER: "/src/img/icon/madamroger.svg"
          API_URL: "https://porto.adamstd.my.id/api"
          TOKEN_APP: "my-secure-api-token12312312313213%%%%$$$$$^^^^^&&&&&****"
          TOKEN_ACCESS_API: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJxb3hwMmVyeDdnZWh3bHoyeXZxcm1vc3giLCJ0aCI6Ilo0Rk14UmU5TmoyYW5jck9fLUlkNjJSYlRGRUdBTktPVEdoSTRCa2w3R2siLCJpYXQiOjE3NjQyNTQ4MTl9.kto9MvwFCnxmndJdH-LnpdN6t1WA9v9BQko-AubLnnY"
        run: pnpm build

      - name: Verify build output
        run: |
          echo "🔍 Verifying Next.js build output..."

          test -d .next || (echo "❌ .next directory not found" && exit 1)
          test -f .next/BUILD_ID || (echo "❌ BUILD_ID not found" && exit 1)

          echo "✅ Build successful"
          echo "BUILD_ID: $(cat .next/BUILD_ID)"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next
          retention-days: 7